# GCP e2-micro deployment: SurrealDB v2 + API + background worker
# All three containers share app_data volume so uploaded files are
# accessible to both the API and the worker.
#
# Prerequisites:
#   - Persistent disk mounted at /mydata
#   - worker.env file present alongside this file (see worker.env.template)
#
# Usage:
#   docker compose -f docker-compose.gcp.yml up -d

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    volumes:
      - /mydata:/mydata
    # No external port - only accessible within Docker network
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    pull_policy: always
    user: root
    restart: always

  api:
    image: ghcr.io/gaspardhassenforder/elearning:api-v1-latest
    ports:
      - "80:8080"  # Port 80 opened via http-server network tag
    env_file:
      - ./worker.env
    depends_on:
      - surrealdb
    volumes:
      - app_data:/app/data
    restart: always

  worker:
    image: ghcr.io/gaspardhassenforder/elearning:api-v1-latest
    command: ["uv", "run", "--no-sync", "surreal-commands-worker",
              "--import-modules", "commands"]
    env_file:
      - ./worker.env
    depends_on:
      - surrealdb
    volumes:
      - app_data:/app/data
    restart: always

volumes:
  app_data:
